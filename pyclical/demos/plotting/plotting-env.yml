name: glucat-pyclical
channels:
  - conda-forge
dependencies:
  - python=3.12
  # Core numerical and build dependencies.
  # numpy<2 is required: conda-forge Mayavi/VTK is not yet compatible with NumPy 2.x.
  # The monkeypatch in plotting_demo_mayavi.py also guards against this at runtime.
  - "numpy<2"
  - scipy
  - cython
  - setuptools
  # Mayavi and VTK graphical stack (x86-64 ONLY).
  # On ARM aarch64 (Asahi Linux), conda-forge VTK binaries are 4KB page-aligned
  # and will segfault on Asahi's 16KB page system. See INSTALL.md for the ARM path.
  # After creating this environment on Ubuntu/Kubuntu with a native GPU, run:
  #   conda remove --force mesalib
  # to prevent the conda-forge Mesa from conflicting with the system OpenGL driver.
  - mayavi
  - vtk
  - pyqt
  - matplotlib
  # Jupyter notebook stack
  - notebook
  - jupyterlab
  - nbformat
  - ipykernel
  # Python test and lint tools
  - pytest
  - ruff
  - pylint
  # C++ documentation tools (for local doc builds)
  - doxygen
  - graphviz
  # C++ build dependencies available on conda-forge
  - boost
  - eigen
  - armadillo
  - qd
  - cppcheck
  - pip
