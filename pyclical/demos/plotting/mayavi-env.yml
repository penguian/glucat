name: pyclical-mayavi
channels:
  - conda-forge
dependencies:
  - python=3.12
  - cython
  - setuptools
  - numpy
  # Mayavi >= 4.8.3 supports NumPy 2.x (released May 2025).
  # x86-64 ONLY: conda-forge VTK binaries are 4KB page-aligned and
  # will segfault on Asahi Linux (16KB page kernel). See INSTALL.md.
  - "mayavi>=4.8.3"
  - vtk
  - pyqt
